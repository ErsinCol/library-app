<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="style.css">
    <title>Library App</title>
</head>
<body>
    <div id="app">
        <div id="header">
            <div class="app-title">
                <img src="assets/book.jpg" alt="book" class="app-logo-img">
                <div class="title-text">
                    E&S LIBRARY
                </div>
            </div>
            <div class="app-toolbar">
                <button class="new-book-btn">
                    <img src="assets/plus-circle.svg" alt="plus-icon" class="plus-icon">
                    <span class="new-book-btn-text">New Book</span>
                </button>
            </div>
        </div>
        <div id="main-content">

        </div>

        <dialog class="modal">
            <form>
                <div class="form-header">
                    <div class="form-title">Add New Book</div>
                    <button class="close-btn">
                        <img src="assets/close.svg" alt="close-icon">
                    </button>
                </div>
                <div class="input-control">
                    <label for="author">Author</label>
                    <input type="text" name="author" id="author" class="input-text">
                </div>
                <div class="input-control">
                    <label for="title">Title</label>
                    <input type="text" name="title" id="title" class="input-text">
                </div>
                <div class="input-control">
                    <label for="page">Page</label>
                    <input type="text" name="page" id="page" class="input-text">
                </div>
                <div class="checkbox-control">
                    <input type="checkbox" name="is_read" id="is_read">
                    <label for="is_read">Is Read</label>
                </div>
                <button type="submit" class="submit-btn">Save</button>
            </form>
        </dialog>

    </div>

    <script src="index.js"></script>
</body>
</html>
